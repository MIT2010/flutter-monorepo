name: shared
description: >-
  Cross-cutting app glue: the DI composition root (get_it + injectable),
  AppRouter (go_router), and the no-op-first Analytics/CrashReporter/
  FeatureFlags interfaces. Knows about "user" and "feature" concepts that
  core deliberately does not.
version: 0.0.1
publish_to: none

resolution: workspace

environment:
  sdk: ^3.12.2
  flutter: ">=1.17.0"

dependencies:
  core:
    path: ../core
  design_system:
    path: ../design_system
  dio: ^5.7.0
  flutter:
    sdk: flutter
  get_it: ^9.2.1
  go_router: ^17.3.0
  injectable: ^3.0.0

dev_dependencies:
  build_runner: ^2.4.13
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  injectable_generator: ^3.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

flutter:
