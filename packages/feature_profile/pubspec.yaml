name: feature_profile
description: >-
  User profile view/edit — second manual feature, deliberately simpler than
  feature_home (pure CRUD, no local cache), to prove the architecture pattern
  is genuinely repeatable before building a Mason generator around it (§14).
version: 0.0.1
publish_to: none

resolution: workspace

environment:
  sdk: ^3.12.2
  flutter: ">=1.17.0"

dependencies:
  core:
    path: ../core
  design_system:
    path: ../design_system
  shared:
    path: ../shared
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  freezed_annotation: ^3.1.0
  injectable: ^3.0.0
  json_annotation: ^4.12.0

dev_dependencies:
  bloc_test: ^10.0.0
  build_runner: ^2.4.13
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  freezed: ^3.2.5
  injectable_generator: ^3.0.0
  json_serializable: ^6.14.0
  mocktail: ^1.0.4

flutter:
