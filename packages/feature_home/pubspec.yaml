name: feature_home
description: >-
  The home feed — first feature to exercise the offline-cache flow (§11):
  read-through Hive CE cache, stale-data fallback on network failure only.
version: 0.0.1
publish_to: none

resolution: workspace

environment:
  sdk: ^3.12.2
  flutter: ">=1.17.0"

dependencies:
  authentication:
    path: ../authentication
  core:
    path: ../core
  design_system:
    path: ../design_system
  shared:
    path: ../shared
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  freezed_annotation: ^3.1.0
  go_router: ^17.3.0
  hive_ce: ^2.19.3
  hive_ce_flutter: ^2.3.4
  injectable: ^3.0.0
  json_annotation: ^4.12.0

dev_dependencies:
  bloc_test: ^10.0.0
  build_runner: ^2.4.13
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  freezed: ^3.2.5
  # Pinned below 1.11.2: that version bumped its analyzer floor to ^12.0.0,
  # which sits outside stable freezed 3.2.5's <11.0.0 ceiling and forces pub
  # to resolve freezed to a prerelease (3.2.6-dev.1) to satisfy both — the
  # same class of conflict ADR-006 already hit once with injectable_generator.
  hive_ce_generator: ">=1.11.0 <1.11.2"
  injectable_generator: ^3.0.0
  json_serializable: ^6.14.0
  mocktail: ^1.0.4

