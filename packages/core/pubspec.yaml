name: core
description: >-
  Pure-Dart foundation package: Result/Failure, UseCase, ApiClient (dio),
  Env, AppLogger, and cross-cutting extensions. Zero Flutter dependency
  by design so it stays reusable across any Dart project.
version: 0.0.1
publish_to: none

resolution: workspace

environment:
  sdk: ^3.12.2

dependencies:
  dio: ^5.7.0
  freezed_annotation: ^3.1.0
  injectable: ^3.0.0
  json_annotation: ^4.12.0
  logger: ^2.5.0

dev_dependencies:
  build_runner: ^2.4.13
  freezed: ^3.2.5
  injectable_generator: ^3.0.0
  json_serializable: ^6.14.0
  lints: ^6.0.0
  test: ^1.25.8
