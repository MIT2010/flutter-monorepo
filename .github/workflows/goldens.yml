name: Regenerate goldens
on:
  workflow_dispatch:
# Manual-trigger-only, deliberately not on push/PR: this job's whole job is
# to PRODUCE a new golden baseline, not to gate anything. Runs on the same
# `ubuntu-latest` runner as `ci.yaml`'s `analyze_test` job on purpose — a
# golden file baked on a contributor's own Windows/macOS machine renders
# text with different font/anti-aliasing than the Linux runner CI actually
# compares against on every push, so a locally-generated baseline looks
# fine on `flutter test --update-goldens` and then fails on the very next
# CI run for reasons that have nothing to do with the widget itself. See
# CONTRIBUTING.md §6 "Regenerating golden files" for the full workflow this
# job is one half of.
#
# Runs across every package with a test/golden/ directory, not just
# design_system — packages/authentication, packages/feature_home, and
# packages/feature_profile each got real page-level golden coverage
# alongside the design_system token upgrade (2026-07-18), proving the app's
# actual screens visually reflect the new tokens, not just the design
# system's own isolated widget catalog.
jobs:
  update_goldens:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
      - run: dart pub global activate fvm
      - run: echo "$HOME/.pub-cache/bin" >> "$GITHUB_PATH"
      - run: fvm install
      - run: fvm dart run tool/verify_fvm.dart
      - run: echo "$(fvm flutter --version --machine | jq -r '.flutterRoot')/bin" >> "$GITHUB_PATH"
      - run: fvm flutter pub get
      # design_system has zero generated code (no freezed/injectable/
      # json_serializable anywhere in it), so it happened to work without
      # this step -- but authentication/feature_home/feature_profile all
      # depend on generated *.freezed.dart/*.g.dart/*.config.dart files,
      # which don't exist on a fresh checkout until build_runner has run.
      # Matches ci.yaml's analyze_test job exactly, which is the whole
      # point of this workflow running on the same runner in the first
      # place.
      - run: dart pub global activate melos
      - run: melos run gen
      - run: fvm flutter test test/golden --update-goldens
        working-directory: packages/design_system
      - uses: actions/upload-artifact@v4
        with:
          name: design-system-goldens
          path: packages/design_system/test/golden/goldens/*.png
      - run: fvm flutter test test/golden --update-goldens
        working-directory: packages/authentication
      - uses: actions/upload-artifact@v4
        with:
          name: authentication-goldens
          path: packages/authentication/test/golden/goldens/*.png
      - run: fvm flutter test test/golden --update-goldens
        working-directory: packages/feature_home
      - uses: actions/upload-artifact@v4
        with:
          name: feature_home-goldens
          path: packages/feature_home/test/golden/goldens/*.png
      - run: fvm flutter test test/golden --update-goldens
        working-directory: packages/feature_profile
      - uses: actions/upload-artifact@v4
        with:
          name: feature_profile-goldens
          path: packages/feature_profile/test/golden/goldens/*.png
