name: mobile
description: "The shippable app (Android/iOS/Web/Desktop) — the composition root (§6)."

resolution: workspace
publish_to: "none" # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  authentication:
    path: ../../packages/authentication
  core:
    path: ../../packages/core
  design_system:
    path: ../../packages/design_system
  feature_home:
    path: ../../packages/feature_home
  feature_profile:
    path: ../../packages/feature_profile
  shared:
    path: ../../packages/shared
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  get_it: ^9.2.1
  go_router: ^17.3.0
  injectable: ^3.0.0

dev_dependencies:
  build_runner: ^2.4.13
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.8
  flutter_test:
    sdk: flutter
  hive_ce_flutter: ^2.3.4
  injectable_generator: ^3.0.0
  path_provider_platform_interface: ^2.1.3

flutter:
  uses-material-design: true
  assets:
    - assets/icon/icon.png

# `flutter pub run flutter_launcher_icons` (or `dart run`) reads this.
# Same placeholder source (the default Flutter template icon) for every
# flavor for now — real per-flavor branding is a follow-up, not blocking
# "the app runs".
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21

# `dart run flutter_native_splash:create` reads this. Solid background in
# design_system's seed color — no logo yet, so this stays a color-only
# splash rather than inventing artwork.
flutter_native_splash:
  color: "#2D6CDF"
  color_dark: "#121212"
  android_12:
    color: "#2D6CDF"
    color_dark: "#121212"
